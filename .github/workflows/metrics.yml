# Visit https://github.com/lowlighter/metrics/blob/master/action.yml for full reference
name: Metrics
on:
    # Schedule updates (each day)
    schedule: [{cron: "0 0 * * *"}] # Lines below let you run workflow manually and on each commit
    workflow_dispatch:
    # push:
    #     branches: [main]
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
        - name: Stats
          uses: lowlighter/metrics@latest
          with:
            # Your GitHub token
            # The following scopes are required:
            #  - public_access (default scope)
            #  - public_repo
            # The following additional scopes may be required:
            #  - read:org  (for organization related metrics)
            #  - read:user (for user related data)
            #  - repo      (optional, if you want to include private repositories)
            token: ${{ secrets.METRICS_TOKEN }}
            filename: .github/assets/metrics-stats.svg
            base: header, activity, community, repositories
            config_timezone: Asia/Dhaka

        - name: Activity Calendar
          uses: lowlighter/metrics@latest
          with:
            token: ${{ secrets.METRICS_TOKEN }}
            filename: .github/assets/metrics-activity.svg
            base: ""
            plugin_isocalendar: yes
            plugin_isocalendar_duration: full-year
            config_timezone: Asia/Dhaka

        - name: Repository Metrics
          uses: lowlighter/metrics@latest
          with:
            filename: .github/assets/metrics-repository.svg
            token: ${{ secrets.METRICS_TOKEN }}
            committer_token: ${{ secrets.GITHUB_TOKEN }}
            user: Andrew-Velox
            template: classic
            base: ""
            config_timezone: Asia/Dhaka
            plugin_followup: yes
            plugin_languages: yes
            plugin_languages_limit: 10
            plugin_languages_details: percentage
            plugin_languages_threshold: 0%
            plugin_languages_ignored: html, css, JavaScript, TypeScript, Jupyter Notebook

            # plugin_projects_repositories: lowlighter/metrics/projects/1

        
